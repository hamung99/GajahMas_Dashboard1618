<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAJAH MAS 2026</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', -apple-system, Arial, sans-serif;
    }
    html, body {
        height: 100%;
    }
    body {
        background: #f1f5f9;
        color: #1e293b;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
    }
    .app-header {
        background: linear-gradient(180deg, #2d3748 0%, #1a202c 100%);
        color: #fff;
        padding: 10px 20px;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 6px 12px;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        position: sticky;
        top: 0;
        z-index: 40;
        flex-shrink: 0;
    }
    .app-header h1 {
        font-size: 18px;
        font-weight: 700;
    }
    .app-header .sub {
        font-size: 11px;
        opacity: 0.75;
        margin-left: 8px;
    }
    #btnLogoutHeader {
        background: rgba(255,255,255,0.08);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 6px;
        padding: 6px 14px;
        font-size: 12px;
        cursor: pointer;
        white-space: nowrap;
    }
    #btnLogoutHeader:hover { background: rgba(255,255,255,0.16); }

    .hub-wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px 20px;
        text-align: center;
        flex: 1;  /* mendorong footer ke bawah */
        width: 100%;
    }
    .kartu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 22px;
        text-align: left;
    }
    .kartu {
        position: relative;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        border: 1px solid #e7ecf3;
        border-radius: 16px;
        padding: 28px 20px 24px;
        text-align: center;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow:
            0 1px 0 rgba(255,255,255,0.8) inset,
            0 1px 2px rgba(15,23,42,0.04),
            0 10px 22px rgba(15,23,42,0.08),
            0 2px 6px rgba(15,23,42,0.05);
        transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    .kartu::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--aksen-1), var(--aksen-2));
    }
    .kartu:hover {
        box-shadow:
            0 1px 0 rgba(255,255,255,0.8) inset,
            0 2px 4px rgba(15,23,42,0.05),
            0 18px 32px rgba(15,23,42,0.12),
            0 4px 10px rgba(15,23,42,0.06);
        transform: translateY(-4px);
    }
    .kartu.kerja { --aksen-1: #2563eb; --aksen-2: #60a5fa; }
    .kartu.laporan { --aksen-1: #16a34a; --aksen-2: #6ee7a0; }
    .kartu.data { --aksen-1: #7c3aed; --aksen-2: #c4b5fd; }
    .kartu .ikon-wrap {
        width: 56px;
        height: 56px;
        margin: 0 auto 14px;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        background: linear-gradient(160deg, var(--aksen-2) 0%, var(--aksen-1) 100%);
        box-shadow:
            0 1px 0 rgba(255,255,255,0.5) inset,
            0 6px 14px rgba(15,23,42,0.18);
    }
    .kartu .judul-kartu {
        font-size: 15px;
        font-weight: 700;
        color: #1a202c;
    }
    .kartu .desc-kartu {
        font-size: 12px;
        color: #64748b;
        margin-top: 6px;
        line-height: 1.5;
        flex: 1;
    }
    .kartu .buka-btn {
        display: inline-block;
        margin-top: 16px;
        font-size: 12px;
        font-weight: 600;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 8px 18px;
        background: linear-gradient(180deg, var(--aksen-2) 0%, var(--aksen-1) 100%);
        box-shadow: 0 4px 10px rgba(15,23,42,0.18), 0 1px 0 rgba(255,255,255,0.4) inset;
        align-self: center;
        margin-top: auto;
    }

    /* Footer terpisah di luar .hub-wrap */
    .footer-site {
        flex-shrink: 0;
        text-align: center;
        padding: 16px 20px;
        border-top: 1px solid #e2e8f0;
        background: #f8fafc;
        color: #94a3b8;
        font-size: 13px;
        letter-spacing: 0.3px;
        margin-top: 20px;  /* jarak opsional dari konten di atas */
    }
</style>
</head>
<body>

<header class="app-header">
    <div>
        <h1>📊 GAJAH MAS 2026</h1>
        <span class="sub">All-in-One</span>
    </div>
    <button id="btnLogoutHeader" type="button" title="Keluar dari akun">🚪 Logout</button>
</header>

<div class="hub-wrap">
    <!-- Judul "Pilih dashboard" dan subjudul telah dihapus -->

    <div class="kartu-grid">
        <a class="kartu kerja" href="dashboard-kerja.html">
            <span class="ikon-wrap">🧾</span>
            <div class="judul-kartu">Dashboard Kerja</div>
            <span class="buka-btn">Buka →</span>
        </a>
        <a class="kartu laporan" href="dashboard-laporan.html">
            <span class="ikon-wrap">📈</span>
            <div class="judul-kartu">Dashboard Laporan</div>
            <span class="buka-btn">Buka →</span>
        </a>
        <a class="kartu data" href="dashboard-data.html">
            <span class="ikon-wrap">🗄️</span>
            <div class="judul-kartu">Dashboard Data</div>
            <span class="buka-btn">Buka →</span>
        </a>
    </div>
</div>

<footer class="footer-site">GAJAH MAS 2026 by hamung</footer>

<script>
    // Login dihapus — halaman ini langsung terbuka tanpa proteksi.
    // Tombol logout dibiarkan ada tapi cuma reload halaman (tidak ada session lagi).
    document.getElementById('btnLogoutHeader').addEventListener('click', function() {
        if (!confirm('Muat ulang halaman?')) return;
        location.reload();
    });
</script>

</body>
</html>
